services:
  postgres:
    container_name: postgres
    image: postgres:16.4
    ports:
      - "5433:5432"
    volumes:
      - database:/var/lib/postgresql/data
    env_file:
      - .postgres.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - app-network

  adminer:
    container_name: adminer
    image: adminer:latest
    restart: always
    ports:
      - "8080:8080"
    networks:
      - app-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env.docker
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: always

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://server:5000
    depends_on:
      - server
    networks:
      - app-network
    restart: always

networks:
  app-network:
    name: app-network

volumes:
  database: